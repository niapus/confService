<!DOCTYPE html>
<html lang="ru">
<head>
   <meta charset="UTF-8">
   <title>{% if conference %}Редактирование{% else %}Создание{% endif %} конференции</title>
   <link rel="stylesheet" href="/static/css/admin-css.css">
</head>
<body>

<div class="admin-container">
   <aside class="sidebar">
      <h2>Администрирование</h2>
      <a href="/admin" class="btn-secondary btn-side">← Назад</a>
   </aside>

   <main class="content">
      <div class="form-container">
         <h1>{% if conference %}Редактировать{% else %}Создать{% endif %} конференцию</h1>

         {% if error %}
         <div class="alert alert-danger" role="alert">
            <strong>Ошибка:</strong> {{ error }}
         </div>
         {% endif %}

         <form method="POST" class="conference-form"
            action="{% if conference %}/admin/conferences/{{ conference.id }}/edit{% else %}/admin/conferences/new{% endif %}">

            <div class="form-row">
               <div class="form-group">
                  <label>Название *</label>
                  <input type="text" name="title"
                         value="{{ form_data.title if form_data else (conference.title if conference else '') }}" required>
               </div>

               <div class="form-group">
                  <label>Теги</label>
                  <input type="text" name="tagline"
                         value="{{ form_data.tagline if form_data else (conference.tagline if conference else '') }}">
               </div>
            </div>

            <div class="form-group">
               <label>Описание (Markdown)</label>
               <textarea name="description_md" rows="20">{{ form_data.description_md if form_data else (conference.description_md if conference else '') }}</textarea>
            </div>

            <div class="form-row">
               <div class="form-group">
                  <label>Дата начала *</label>
                  <input type="date" name="start_date"
                         value="{{ form_data.start_date if form_data else (conference.start_date.strftime('%Y-%m-%d') if conference else '') }}" required>
               </div>

               <div class="form-group">
                  <label>Дата окончания *</label>
                  <input type="date" name="end_date"
                         value="{{ form_data.end_date if form_data else (conference.end_date.strftime('%Y-%m-%d') if conference else '') }}" required>
               </div>
            </div>

            <div class="form-row">
               <div class="form-group">
                  <label>Дедлайн регистрации *</label>
                  <input type="date" name="registration_deadline"
                         value="{{ form_data.registration_deadline if form_data else (conference.registration_deadline.strftime('%Y-%m-%d') if conference else '') }}" required>
               </div>

               <div class="form-group">
                  <label>Дедлайн подачи тезисов *</label>
                  <input type="date" name="submission_deadline"
                         value="{{ form_data.submission_deadline if form_data else (conference.submission_deadline.strftime('%Y-%m-%d') if conference else '') }}" required>
               </div>
            </div>

            <div class="form-row">
               <div class="form-group">
                  <label>Время на выступление (мин) *</label>
                  <input type="number" name="performance_time" min="1"
                         value="{{ form_data.performance_time if form_data else (conference.performance_time if conference else 15) }}" required>
               </div>
            </div>

            <div class="actions">
               <button type="submit" class="btn-primary">Сохранить</button>
               <a href="/admin" class="btn-secondary">Отмена</a>
            </div>
         </form>
      </div>
   </main>
</div>

</body>
</html>
