{% extends "base.html" %}

{% block title %}Заявка на участие{% endblock %}

{% block content %}
<h2>Заявка на участие в конференции</h2>

<!-- ⭐ БЛОК ДЛЯ ОТОБРАЖЕНИЯ ОШИБКИ -->
{% if error %}
<div class="alert alert-danger" role="alert">
   <strong>Ошибка:</strong> {{ error }}
</div>
{% endif %}

<form method="post" enctype="multipart/form-data" class="form-application" id="application-form">

   <fieldset>
      <legend>Персональные данные</legend>

      <div class="form-row">
         <div class="form-group">
            <label>Фамилия *</label>
            <input type="text" name="surname" required placeholder="Иванов"
                   value="{{ form_data.surname if form_data else '' }}">
         </div>

         <div class="form-group">
            <label>Имя *</label>
            <input type="text" name="name" required placeholder="Иван"
                   value="{{ form_data.name if form_data else '' }}">
         </div>

         <div class="form-group">
            <label>Отчество</label>
            <input type="text" name="patronymic" placeholder="Иванович"
                   value="{{ form_data.patronymic if form_data else '' }}">
         </div>
      </div>

      <div class="form-row">
         <div class="form-group">
            <label>Пол *</label>
            <div class="radio-group">
               <label class="radio-label">
                  <input type="radio" name="gender" value="male" required
                         {% if form_data and form_data.gender == 'male' %}checked{% endif %}> Мужской
               </label>
               <label class="radio-label">
                  <input type="radio" name="gender" value="female" required
                         {% if form_data and form_data.gender == 'female' %}checked{% endif %}> Женский
               </label>
            </div>
         </div>

         <div class="form-group">
            <label>Дата рождения *</label>
            <input type="date" name="birth_date" required
                   value="{{ form_data.birth_date if form_data else '' }}">
         </div>
      </div>
   </fieldset>

   <fieldset>
      <legend>Образование и статус</legend>

      <div class="form-row">
         <div class="form-group">
            <label>Ученая степень *</label>
            <select name="degree" required>
               <option value="none" {% if form_data and form_data.degree == 'none' %}selected{% endif %}>Нет</option>
               <option value="candidate" {% if form_data and form_data.degree == 'candidate' %}selected{% endif %}>Кандидат наук</option>
               <option value="doctor" {% if form_data and form_data.degree == 'doctor' %}selected{% endif %}>Доктор наук</option>
            </select>
         </div>

         <div class="form-group">
            <label>Статус *</label>
            <div class="checkbox-group">
               <label class="checkbox-label">
                  <input type="checkbox" name="status" value="worker" id="status-worker"
                         {% if form_data and 'worker' in form_data.getlist('status') %}checked{% endif %}> Работник
               </label>
               <label class="checkbox-label">
                  <input type="checkbox" name="status" value="student" id="status-student"
                         {% if form_data and 'student' in form_data.getlist('status') %}checked{% endif %}> Студент
               </label>
            </div>
         </div>
      </div>

      <div class="form-group" id="work-place-group" style="display: {% if form_data and 'worker' in form_data.getlist('status') %}block{% else %}none{% endif %};">
         <label>Место работы *</label>

         <div class="sub-field">
            <input type="text" name="work_name" required
                   value="{{ form_data.work_name if form_data else '' }}">
         </div>

         <div class="sub-field">
            <label>Институт *:</label>
            <input type="text" name="work_place"
                   value="{{ form_data.work_place if form_data else '' }}">
         </div>

         <div class="sub-field">
            <label>Должность *:</label>
            <input type="text" name="work_position" required
                   value="{{ form_data.work_position if form_data else '' }}">
         </div>
      </div>

      <div class="form-group" id="study-place-group" style="display: {% if form_data and 'student' in form_data.getlist('status') %}block{% else %}none{% endif %};">
         <label>Место учебы *</label>

         <div class="sub-field">
            <input type="text" name="study_name"
                   value="{{ form_data.study_name if form_data else '' }}">
         </div>

         <div class="sub-field">
            <label>Институт *:</label>
            <input type="text" name="study_place"
                   value="{{ form_data.study_place if form_data else '' }}">
         </div>

         <div class="sub-field">
            <label>Уровень обучения *:</label>
            <select name="study_level" required>
               <option value="none" {% if form_data and form_data.study_level == 'none' %}selected{% endif %}>Бакалавриат</option>
               <option value="education_spec" {% if form_data and form_data.study_level == 'education_spec' %}selected{% endif %}>Специалитет</option>
               <option value="education_mag" {% if form_data and form_data.study_level == 'education_mag' %}selected{% endif %}>Магистратура</option>
               <option value="education_asp" {% if form_data and form_data.study_level == 'education_asp' %}selected{% endif %}>Аспирантура</option>
            </select>
         </div>
      </div>
   </fieldset>

   <fieldset>
      <legend>Участие</legend>

      <div class="form-group">
         <div class="radio-group">
            <label class="radio-label">
               <input type="radio" name="participation_format" value="offline" required
                      {% if form_data and form_data.participation_format == 'offline' %}checked{% endif %}> Очно
            </label>
            <label class="radio-label">
               <input type="radio" name="participation_format" value="online" required
                      {% if form_data and form_data.participation_format == 'online' %}checked{% endif %}> Онлайн
            </label>
         </div>
      </div>
   </fieldset>

   <fieldset>
      <legend>Контакты</legend>
      <div class="form-group">
         <label>Email *</label>
         <input type="email" name="email" required placeholder="ivan@example.com"
                value="{{ form_data.email if form_data else '' }}">
      </div>
   </fieldset>

   <div class="form-actions">
      <button type="submit" class="btn btn-primary">Отправить заявку</button>
      <a href="javascript:history.back()" class="btn btn-secondary">Отмена</a>
   </div>
</form>

<script src="{{ url_for('static', filename='js/application.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/application.css') }}">
{% endblock %}
