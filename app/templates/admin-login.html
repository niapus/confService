<!DOCTYPE html>
<html lang="ru">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Вход в административную панель</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-login.css') }}">
</head>
<body>
   <div class="login-container">
      <div class="login-card">
         <div class="login-header">
            <h2>Административная панель</h2>
            <p>Введите учетные данные для входа</p>
         </div>

         <div class="login-form">
            <div id="error-message" class="error-message hidden">
               Неверный логин или пароль
            </div>

            <form id="login-form" method="POST" action="/auth/login">
               <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
               <div class="form-group">
                  <label for="login">Логин</label>
                  <input type="text" id="login" name="login" required placeholder="Введите логин">
               </div>

               <div class="form-group">
                  <label for="password">Пароль</label>
                  <input type="password" id="password" name="password" required placeholder="Введите пароль">
               </div>

               <button type="submit" class="btn-login">Войти</button>
            </form>
         </div>

         <div class="login-footer">
            <a href="/">Вернуться на главную</a>
         </div>
      </div>
   </div>
</body>
</html>
