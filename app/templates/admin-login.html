<!DOCTYPE html>
<html lang="ru">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Вход в административную панель</title>
   <style>
      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      body {
         margin: 0;
         font-family: Arial, sans-serif;
         background: #f5f7fa;
         height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
      }

      .login-container {
         display: flex;
         justify-content: center;
         align-items: center;
         width: 100%;
         padding: 20px;
      }

      .login-card {
         background: white;
         border-radius: 12px;
         box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
         width: 100%;
         max-width: 420px;
         overflow: hidden;
      }

      .login-header {
         background: #1f2937;
         padding: 30px;
         text-align: center;
      }

      .login-header h2 {
         color: white;
         font-size: 1.5rem;
         margin-bottom: 8px;
      }

      .login-header p {
         color: #9ca3af;
         font-size: 0.875rem;
      }

      .login-form {
         padding: 30px;
      }

      .form-group {
         margin-bottom: 20px;
      }

      .form-group label {
         display: block;
         margin-bottom: 8px;
         font-weight: 500;
         color: #374151;
         font-size: 0.875rem;
      }

      .form-group input {
         width: 100%;
         padding: 10px 12px;
         border: 1px solid #d1d5db;
         border-radius: 6px;
         font-size: 0.875rem;
         transition: all 0.2s;
         box-sizing: border-box;
      }

      .form-group input:focus {
         outline: none;
         border-color: #2563eb;
         box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .btn-login {
         width: 100%;
         padding: 12px;
         background: #2563eb;
         color: white;
         border: none;
         border-radius: 6px;
         font-size: 0.875rem;
         font-weight: 500;
         cursor: pointer;
         transition: background 0.2s;
      }

      .btn-login:hover {
         background: #1d4ed8;
      }

      .error-message {
         background: #fee2e2;
         color: #991b1b;
         padding: 10px 12px;
         border-radius: 6px;
         font-size: 0.875rem;
         margin-bottom: 20px;
         border-left: 3px solid #dc2626;
      }

      .error-message.hidden {
         display: none;
      }

      .login-footer {
         text-align: center;
         padding: 20px 30px;
         border-top: 1px solid #e5e7eb;
         background: #f9fafb;
      }

      .login-footer a {
         color: #2563eb;
         text-decoration: none;
         font-size: 0.875rem;
      }

      .login-footer a:hover {
         text-decoration: underline;
      }
   </style>
</head>
<body>
   <div class="login-container">
      <div class="login-card">
         <div class="login-header">
            <h2>Административная панель</h2>
            <p>Введите учетные данные для входа</p>
         </div>

         <div class="login-form">
            <div id="error-message" class="error-message hidden">
               Неверный логин или пароль
            </div>

            <form id="login-form" method="POST" action="/admin/login">
               <div class="form-group">
                  <label for="username">Логин</label>
                  <input type="text" id="username" name="username" required placeholder="Введите логин">
               </div>

               <div class="form-group">
                  <label for="password">Пароль</label>
                  <input type="password" id="password" name="password" required placeholder="Введите пароль">
               </div>

               <button type="submit" class="btn-login">Войти</button>
            </form>
         </div>

         <div class="login-footer">
            <a href="/">Вернуться на главную</a>
         </div>
      </div>
   </div>
</body>
</html>
