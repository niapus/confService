{% extends "base.html" %}

{% block title %}Ошибка {{ error.code }}{% endblock %}

{% block content %}

<div class="error-alert">
   <strong class="error-code">Код {{ error.status_code }}:</strong> {{ error.message }}
   <a href="javascript:history.back()" class="error-back-link">← Назад</a>
</div>

<link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">

{% endblock %}
