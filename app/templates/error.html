{% extends "base.html" %}

{% block title %}Ошибка {{ error.code }}{% endblock %}

{% block content %}

<div class="error-alert">
   <strong class="error-code">Код {{ error.status_code }}:</strong> {{ error.message }}
   <a href="javascript:history.back()" class="error-back-link">← Назад</a>
</div>

<style>
.error-alert {
   text-align: center;
   padding: 40px;
   border-radius: 12px;
   background: #fee;
   border-left: 4px solid #e74c3c;
   max-width: 500px;
   margin: 40px auto;
}

.error-code {
   font-size: 18px;
   display: block;
   margin-bottom: 10px;
}

.error-back-link {
   display: inline-block;
   margin-top: 20px;
   color: #3498db;
   text-decoration: none;
}
</style>

{% endblock %}
