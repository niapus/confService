{% extends "base.html" %}

{% block title %}Ошибка {{ error.code }}{% endblock %}

{% block content %}

<div class="error-alert">
   <strong class="error-code">Код {{ error.status_code }}:</strong> {{ error.message }}
   <a href="javascript:history.back()" class="error-back-link">← Назад</a>
</div>

<style>
.error-alert {
   text-align: center;
   padding: 40px;
   border-radius: 12px;
   background: #fee;
   border-left: 4px solid #e74c3c;
   max-width: 500px;
   margin: 40px auto;
}

.error-code {
   font-size: 18px;
   margin-bottom: 10px;
}

.error-back-link {
   display: block;
   width: fit-content;
   padding: 5px 10px;
   font-size: 18px;
   background: #e5e7eb;
   border: none;
   border-radius: 4px;
   cursor: pointer;
   text-decoration: none;
   color: black;
   margin: 20px auto 0;
}

.error-back-link:hover {
   background: #d1d5db;
}
</style>

{% endblock %}
